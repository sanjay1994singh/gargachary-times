{% extends 'base.html' %}

{% block metatags %}
<meta property="og:title" content="Today's E-Paper | Gargachary Times">
<meta property="og:description" content="Read today's digital edition of Gargachary Times.">
<meta property="og:image" content="{{ absolute_image_url }}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:type" content="website">
<!-- Optional: Twitter Card meta tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ news.title }}">
<meta name="twitter:image" content="{{ absolute_image_url }}">
{% endblock metatags %}

{% block css %}
<style>
    body{background:#f2f2f2;margin:0}

    /* FULL LOADER */
    #pdf-loader{
        position:fixed;inset:0;
        background:#fff;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        z-index:9999;
    }
    .spinner{
        width:45px;height:45px;
        border:5px solid #ddd;
        border-top:5px solid #000;
        border-radius:50%;
        animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PDF CONTAINER */
    #pdf-slider-container{
        max-width:900px;
        margin:20px auto;
        background:#fff;
        border-radius:10px;
        position:relative;
        box-shadow:0 2px 10px rgba(0,0,0,.2);
        overflow:hidden;
        padding:0 60px; /* space for arrow buttons */
    }

    #pdf-slider{
        width:100%;
    }

    #pdf-slider canvas{
        width:100%;
        height:auto;
        display:block;
    }

    /* PAGE LOADER */
    #page-loader{
        position:absolute;
        inset:0;
        background:rgba(255,255,255,.85);
        display:none;
        align-items:center;
        justify-content:center;
        z-index:5;
    }

    /* NAVIGATION BUTTONS */
    .nav-btn{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        background:rgba(0,0,0,.6);
        color:#fff;
        border:none;
        width:40px;
        height:40px;
        border-radius:50%;
        cursor:pointer;
        z-index:6;
    }
    #prev-btn{left:15px;}
    #next-btn{right:15px;}

    /* MOBILE SIDE SPACE */
    @media (max-width:768px){
        #pdf-slider-container{padding:0 45px;}
    }

    /* Calendar and Share */
    .calendar-container {
        margin: 15px auto;
        text-align: center;
        padding: 10px;
    }
    .calendar-container input[type="date"] {
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        width: 250px;
        font-size: 16px;
    }
    .share-links {
        margin: 10px 0;
    }
    .share-links a {
        text-decoration: none;
        margin-right: 10px;
        font-size: 24px;
        color: #000;
    }

    @media (max-width: 768px) {
        .nav-btn {
            width: 38px;
            height: 38px;
            font-size: 18px;
        }
    }
</style>
{% endblock %}

{% block content %}

<div id="pdf-loader">
    <div class="spinner"></div>
    <p>Loading PDF…</p>
</div>


{% if pdf %}
<div id="pdf-slider-container">
    <div class="calendar-container">
        <label for="calendar">Select Date:</label>
        <input type="date" id="calendar" name="calendar" value="{{ selected_date }}">

        <div class="share-links mb-4 d-flex align-items-center">
            <span class="me-3 fw-bold">Share:</span>
            <a href="https://wa.me/?text={{ news.title }} - {{ request.build_absolute_uri }}" target="_blank"
               class="me-3 text-success fs-5">
                <i class="bi bi-whatsapp"></i>
            </a>
            <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}"
               target="_blank" class="me-3 text-primary fs-5">
                <i class="bi bi-facebook"></i>
            </a>
            <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}&text={{ news.title }}"
               target="_blank" class="text-info fs-5">
                <i class="bi bi-twitter-x"></i>
            </a>
        </div>
    </div>
    <button id="prev-btn" class="nav-btn">&#8249;</button>
    <div id="pdf-slider"></div>

    <div id="page-loader">
        <div class="spinner"></div>
    </div>

    <button id="next-btn" class="nav-btn">&#8250;</button>
</div>
{% else %}
<p class="text-center mt-4">No PDF available</p>
{% endif %}

{% endblock %}

{% block js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

{% block js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

{% if pdf %}
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

const url = "{{ pdf.pdf_file.url }}";

const slider = document.getElementById("pdf-slider");
const loader = document.getElementById("pdf-loader");
const pageLoader = document.getElementById("page-loader");

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let rendering = false;

const cache = {};

async function initPDF() {

    loader.style.display = "flex";

    try {

        const loadingTask = pdfjsLib.getDocument({
            url: url,
            disableAutoFetch: false,
            disableStream: false,
            disableRange: false
        });

        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;

        await renderPage(1);

    } catch (error) {

        console.error("PDF Load Error:", error);

        slider.innerHTML = `
            <div class="text-center p-5">
                <h4>Unable to load PDF</h4>
            </div>
        `;

    } finally {

        loader.style.display = "none";
    }
}

async function renderPage(pageNum) {

    if (rendering) return;

    rendering = true;

    pageLoader.style.display = "flex";

    try {

        if (cache[pageNum]) {

            slider.innerHTML = "";
            slider.appendChild(cache[pageNum]);

            pageLoader.style.display = "none";
            rendering = false;

            preloadPage(pageNum + 1);

            return;
        }

        const page = await pdfDoc.getPage(pageNum);

        let scale;

        if (window.innerWidth < 576) {
            scale = 1.2;
        } else if (window.innerWidth < 768) {
            scale = 1.3;
        } else {
            scale = 1.4;
        }

        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", {
            alpha: false
        });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        const wrapper = document.createElement("div");
        wrapper.className = "pdf-page";
        wrapper.appendChild(canvas);

        cache[pageNum] = wrapper;

        slider.innerHTML = "";
        slider.appendChild(wrapper);

        preloadPage(pageNum + 1);

    } catch (error) {

        console.error("Page Render Error:", error);

    } finally {

        pageLoader.style.display = "none";
        rendering = false;
    }
}

async function preloadPage(pageNum) {

    if (!pdfDoc) return;

    if (pageNum > totalPages) return;

    if (cache[pageNum]) return;

    try {

        const page = await pdfDoc.getPage(pageNum);

        const viewport = page.getViewport({
            scale: 1.2
        });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        const wrapper = document.createElement("div");
        wrapper.className = "pdf-page";
        wrapper.appendChild(canvas);

        cache[pageNum] = wrapper;

    } catch (error) {

        console.log("Preload Error:", error);
    }
}

document.getElementById("prev-btn").addEventListener("click", () => {

    if (currentPage > 1) {

        currentPage--;
        renderPage(currentPage);
    }
});

document.getElementById("next-btn").addEventListener("click", () => {

    if (currentPage < totalPages) {

        currentPage++;
        renderPage(currentPage);
    }
});

document.addEventListener("keydown", (e) => {

    if (e.key === "ArrowLeft" && currentPage > 1) {

        currentPage--;
        renderPage(currentPage);
    }

    if (e.key === "ArrowRight" && currentPage < totalPages) {

        currentPage++;
        renderPage(currentPage);
    }
});

let startX = 0;

slider.addEventListener("touchstart", (e) => {
    startX = e.changedTouches[0].screenX;
});

slider.addEventListener("touchend", (e) => {

    const endX = e.changedTouches[0].screenX;
    const diff = startX - endX;

    if (Math.abs(diff) < 50) return;

    if (diff > 0 && currentPage < totalPages) {

        currentPage++;
        renderPage(currentPage);

    } else if (diff < 0 && currentPage > 1) {

        currentPage--;
        renderPage(currentPage);
    }
});

$(document).ready(function () {

    $('#calendar').on('change', function () {

        let selectedDate = $(this).val();

        if (selectedDate) {

            window.location.href =
                "?date=" + encodeURIComponent(selectedDate);
        }
    });
});

initPDF();
</script>
{% endif %}
{% endblock %}
