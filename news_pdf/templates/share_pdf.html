{% extends 'base.html' %}

{% block title %}{{ news.title }} | Gargachary Times{% endblock %}

{% block metatags %}
<meta property="og:title" content="Today's E-Paper | Gargachary Times">
<meta property="og:description" content="Read today's digital edition of Gargachary Times.">
<meta property="og:image" content="{{ absolute_image_url }}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:type" content="website">

{% endblock metatags %}

{% block css %}
<style>
    .share-links {
        margin: 10px 0;
    }
    .share-links a {
        text-decoration: none;
        margin-right: 10px;
        font-size: 24px;
        color: #000;
    }

    .pdf-viewer{
    text-align:center;
    padding:20px;
}

#pdf-canvas{
    max-width:100%;
    border:1px solid #ddd;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

#prev-btn,
#next-btn{
    padding:10px 15px;
    margin:10px;
    cursor:pointer;
}
</style>


{% endblock css %}

{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <!-- Title -->
                <h1 class="display-5 fw-bold mb-3">{{ news.title }}</h1>

                <!-- Social Share -->
                <div class="share-links mb-4 d-flex align-items-center">
                    <span class="me-3 fw-bold">Share:</span>
                    <a href="https://wa.me/?text={{ news.title }} - {{ request.build_absolute_uri }}" target="_blank"
                       class="me-3 text-success fs-5">
                        <i class="bi bi-whatsapp"></i>
                    </a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}"
                       target="_blank" class="me-3 text-primary fs-5">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}&text={{ news.title }}"
                       target="_blank" class="text-info fs-5">
                        <i class="bi bi-twitter-x"></i>
                    </a>
                </div>

                <div class="pdf-viewer">

                    <button id="prev-btn">← Previous</button>

                    <span>
        Page <span id="page-num">1</span> /
        <span id="page-count">0</span>
    </span>

                    <button id="next-btn">Next →</button>

                    <div class="mt-3 text-center">
                        <canvas id="pdf-canvas"></canvas>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}


{% block js %}

<script type="module">

    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';

    const pdfUrl = "{{ news.pdf_file.url }}";

    let pdfDoc = null;
    let currentPage = 1;

    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');

    async function renderPage(pageNumber) {

        const page = await pdfDoc.getPage(pageNumber);

        const viewport = page.getViewport({
            scale: window.innerWidth < 768 ? 1.2 : 1.8
        });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;

        document.getElementById('page-num').textContent = pageNumber;
    }

    async function loadPDF() {

        try {

            const loadingTask = pdfjsLib.getDocument(pdfUrl);

            pdfDoc = await loadingTask.promise;

            document.getElementById('page-count').textContent =
                pdfDoc.numPages;

            await renderPage(currentPage);

        } catch (error) {

            console.error('PDF Load Error:', error);

        }
    }

    document.getElementById('prev-btn').addEventListener('click', async () => {

        if (currentPage <= 1) return;

        currentPage--;

        await renderPage(currentPage);
    });

    document.getElementById('next-btn').addEventListener('click', async () => {

        if (currentPage >= pdfDoc.numPages) return;

        currentPage++;

        await renderPage(currentPage);
    });

    document.addEventListener('keydown', async (e) => {

        if (e.key === 'ArrowLeft' && currentPage > 1) {

            currentPage--;

            await renderPage(currentPage);
        }

        if (e.key === 'ArrowRight' &&
            currentPage < pdfDoc.numPages) {

            currentPage++;

            await renderPage(currentPage);
        }
    });

    loadPDF();

</script>
{% endblock js %}
