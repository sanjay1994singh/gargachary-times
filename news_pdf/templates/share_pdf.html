{% extends 'base.html' %}

{% block title %}{{ news.title }} | Gargachary Times{% endblock %}

{% block metatags %}
<meta property="og:title" content="{{ news.title }}">
<meta property="og:description" content="Read today's digital edition of Gargachary Times.">
<meta property="og:image" content="{{ absolute_image_url }}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:type" content="article">
{% endblock %}

{% block css %}
<style>

    .share-links{
        margin-bottom:20px;
    }

    .share-links a{
        text-decoration:none;
        margin-right:15px;
        font-size:24px;
    }

    .pdf-viewer{
        background:#fff;
        border-radius:15px;
        padding:20px;
        box-shadow:0 5px 25px rgba(0,0,0,.08);
        position:relative;
        overflow:hidden;
    }

    .pdf-toolbar{
        display:flex;
        justify-content:center;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
        margin-bottom:20px;
    }

    .toolbar-btn{
        border:none;
        background:#000;
        color:#fff;
        border-radius:8px;
        padding:10px 15px;
        cursor:pointer;
    }

    .page-badge{
        background:#f3f3f3;
        padding:10px 15px;
        border-radius:30px;
        font-weight:600;
    }

    #pdf-canvas{
        max-width:100%;
        height:auto;
        border-radius:10px;
        box-shadow:0 0 20px rgba(0,0,0,.08);
        transition:opacity .25s ease;
    }

    .nav-arrow{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        width:55px;
        height:55px;
        border:none;
        border-radius:50%;
        background:rgba(0,0,0,.75);
        color:#fff;
        font-size:24px;
        cursor:pointer;
        z-index:50;
    }

    #prev-btn{
        left:15px;
    }

    #next-btn{
        right:15px;
    }

    .loader{
        display:none;
        position:absolute;
        inset:0;
        background:rgba(255,255,255,.75);
        justify-content:center;
        align-items:center;
        z-index:100;
    }

    .loader::after{
        content:'';
        width:50px;
        height:50px;
        border:5px solid #ddd;
        border-top:5px solid #000;
        border-radius:50%;
        animation:spin .8s linear infinite;
    }

    @keyframes spin{
        to{
            transform:rotate(360deg);
        }
    }

    @media(max-width:768px){

        .nav-arrow{
            width:45px;
            height:45px;
            font-size:18px;
        }

        .pdf-viewer{
            padding:10px;
        }

    }

</style>
{% endblock %}

{% block content %}

<section class="py-5 bg-light">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-10">

                <h1 class="fw-bold mb-4">
                    {{ news.title }}
                </h1>

                <div class="share-links d-flex align-items-center">

                    <span class="fw-bold me-3">
                        Share:
                    </span>

                    <a href="https://wa.me/?text={{ news.title }} - {{ request.build_absolute_uri }}"
                       target="_blank"
                       class="text-success">
                        <i class="bi bi-whatsapp"></i>
                    </a>

                    <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}"
                       target="_blank"
                       class="text-primary">
                        <i class="bi bi-facebook"></i>
                    </a>

                    <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}&text={{ news.title }}"
                       target="_blank"
                       class="text-dark">
                        <i class="bi bi-twitter-x"></i>
                    </a>

                </div>

                <div class="pdf-viewer">

                    <div class="pdf-toolbar">

                        <button id="zoom-out"
                                class="toolbar-btn">
                            −
                        </button>

                        <div class="page-badge">

                            Page
                            <span id="page-num">
                                1
                            </span>

                            /

                            <span id="page-count">
                                0
                            </span>

                        </div>

                        <button id="zoom-in"
                                class="toolbar-btn">
                            +
                        </button>

                    </div>

                    <button id="prev-btn"
                            class="nav-arrow">
                        ❮
                    </button>

                    <button id="next-btn"
                            class="nav-arrow">
                        ❯
                    </button>

                    <div id="loader"
                         class="loader">
                    </div>

                    <div class="text-center">

                        <canvas id="pdf-canvas">
                        </canvas>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}

{% block js %}

<script type="module">

    import * as pdfjsLib
    from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';

    const pdfUrl =
    "{{ news.pdf_file.url }}";

    const canvas =
    document.getElementById('pdf-canvas');

    const ctx =
    canvas.getContext('2d');

    const loader =
    document.getElementById('loader');

    let pdfDoc = null;

    let currentPage = 1;

    let scale =
    window.innerWidth < 768
    ? 1.2
    : 1.8;

    async function renderPage(pageNumber){

        loader.style.display='flex';

        canvas.style.opacity='.4';

        const page =
        await pdfDoc.getPage(pageNumber);

        const viewport =
        page.getViewport({
            scale:scale
        });

        canvas.width =
        viewport.width;

        canvas.height =
        viewport.height;

        await page.render({
            canvasContext:ctx,
            viewport:viewport
        }).promise;

        document.getElementById('page-num')
        .textContent = pageNumber;

        document.title =
        `${pageNumber}/${pdfDoc.numPages} - {{ news.title }}`;

        canvas.style.opacity='1';

        loader.style.display='none';
    }

    async function loadPDF(){

        try{

            const loadingTask =
            pdfjsLib.getDocument(pdfUrl);

            pdfDoc =
            await loadingTask.promise;

            document.getElementById('page-count')
            .textContent =
            pdfDoc.numPages;

            await renderPage(currentPage);

        }catch(error){

            console.error(error);

            alert(
                'Unable to load PDF'
            );
        }
    }

    document.getElementById('next-btn')
    .addEventListener('click',
    async ()=>{

        if(
            currentPage <
            pdfDoc.numPages
        ){

            currentPage++;

            await renderPage(
                currentPage
            );
        }
    });

    document.getElementById('prev-btn')
    .addEventListener('click',
    async ()=>{

        if(
            currentPage > 1
        ){

            currentPage--;

            await renderPage(
                currentPage
            );
        }
    });

    document.getElementById('zoom-in')
    .addEventListener('click',
    async ()=>{

        scale += .2;

        await renderPage(
            currentPage
        );
    });

    document.getElementById('zoom-out')
    .addEventListener('click',
    async ()=>{

        if(scale <= .8)
            return;

        scale -= .2;

        await renderPage(
            currentPage
        );
    });

    document.addEventListener(
    'keydown',
    async(e)=>{

        if(
            e.key==='ArrowRight' &&
            currentPage < pdfDoc.numPages
        ){

            currentPage++;

            await renderPage(
                currentPage
            );
        }

        if(
            e.key==='ArrowLeft' &&
            currentPage > 1
        ){

            currentPage--;

            await renderPage(
                currentPage
            );
        }

    });

    let touchStartX = 0;

    canvas.addEventListener(
    'touchstart',
    (e)=>{

        touchStartX =
        e.changedTouches[0]
        .screenX;
    });

    canvas.addEventListener(
    'touchend',
    async(e)=>{

        const touchEndX =
        e.changedTouches[0]
        .screenX;

        const diff =
        touchStartX -
        touchEndX;

        if(
            Math.abs(diff) < 50
        ) return;

        if(
            diff > 0 &&
            currentPage <
            pdfDoc.numPages
        ){

            currentPage++;

            await renderPage(
                currentPage
            );

        }else if(
            diff < 0 &&
            currentPage > 1
        ){

            currentPage--;

            await renderPage(
                currentPage
            );
        }

    });

    loadPDF();

</script>

{% endblock %}
